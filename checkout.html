<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Keystone Coffee</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .checkout-page {
      min-height: calc(100vh - 96px);
      background: var(--bg);
      padding: 56px 24px 96px;
    }

    .checkout-shell {
      max-width: 1080px;
      margin: 0 auto;
    }

    .checkout-heading {
      color: rgba(217, 158, 84, 1);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 4vw, 3rem);
      font-weight: 700;
      margin: 0 0 8px;
    }

    .checkout-subheading {
      color: rgba(247, 244, 239, 0.78);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.02rem;
      margin: 0 0 40px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.85fr);
      gap: 40px;
      align-items: start;
    }

    .checkout-right-column {
      display: grid;
      gap: 24px;
    }

    .checkout-panel {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(217, 158, 84, 0.55);
      border-radius: 16px;
      padding: 32px 30px;
    }

    .checkout-panel h2 {
      color: rgba(217, 158, 84, 1);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 22px;
    }

    /* Order summary */
    .summary-item {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(217, 158, 84, 0.22);
    }

    .summary-item:first-of-type { padding-top: 0; }

    .summary-item-image {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      background: #e9e9e9;
      display: block;
    }

    .summary-item-name {
      margin: 0;
      color: rgb(247, 244, 239);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .summary-item-meta {
      margin: 4px 0 0;
      color: rgba(247, 244, 239, 0.65);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 0.9rem;
    }

    .summary-item-price {
      margin: 0;
      color: rgba(217, 158, 84, 1);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.02rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .summary-total {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 22px;
      border-top: 2px solid rgba(217, 158, 84, 0.55);
    }

    .summary-total-label {
      color: rgba(217, 158, 84, 1);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .summary-total-amount {
      color: rgba(217, 158, 84, 1);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.7rem;
      font-weight: 700;
    }

    .summary-empty {
      color: rgba(247, 244, 239, 0.8);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.02rem;
      line-height: 1.7;
    }

    .summary-empty a {
      color: rgba(217, 158, 84, 1);
      font-weight: 700;
      text-decoration: underline;
    }

    /* Payment column */
    #payment-element { margin-bottom: 26px; min-height: 60px; }

    .shipping-form {
      text-align: left;
      display: grid;
      gap: 14px;
    }

    .shipping-form label {
      display: grid;
      gap: 6px;
      color: rgb(247, 244, 239);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 0.98rem;
    }

    .shipping-form input {
      border: 1px solid rgba(217, 158, 84, 0.45);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: rgb(247, 244, 239);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1rem;
      padding: 12px;
    }

    .shipping-form input::placeholder {
      color: rgba(247, 244, 239, 0.65);
    }

    .pay-btn {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 8px;
      background: rgba(217, 158, 84, 1);
      color: rgb(110, 67, 77);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .pay-btn:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .pay-btn:disabled { opacity: 0.6; cursor: default; }

    .pay-btn-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: -3px;
      border: 2px solid rgba(110, 67, 77, 0.35);
      border-top-color: rgb(110, 67, 77);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .pay-message {
      margin: 18px 0 0;
      color: rgb(255, 178, 178);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 0.98rem;
      text-align: center;
      min-height: 1.2em;
    }

    .checkout-secure {
      margin: 20px 0 0;
      color: rgba(247, 244, 239, 0.6);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 0.85rem;
      text-align: center;
    }

    .checkout-result-panel {
      text-align: center;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .checkout-result-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }

    .checkout-result-email {
      color: rgba(217, 158, 84, 0.9);
      font-weight: 700;
    }

    .checkout-result-note {
      color: rgba(217, 158, 84, 0.9);
      font-weight: 700;
      margin-top: 10px;
    }

    .checkout-result-actions {
      margin-top: 28px;
      display: grid;
      gap: 12px;
    }

    .checkout-result-actions .pay-btn {
      display: block;
      text-decoration: none;
      line-height: 56px;
      text-align: center;
    }

    .tracking-link {
      color: rgba(217, 158, 84, 1);
      font-weight: 700;
      text-decoration: underline;
    }

    .checkout-back {
      display: inline-block;
      margin-bottom: 28px;
      color: rgba(217, 158, 84, 0.9);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    .checkout-back:hover { color: rgba(217, 158, 84, 1); text-decoration: underline; }

    .checkout-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 0;
    }

    .checkout-loading p {
      color: rgba(247, 244, 239, 0.75);
      font-family: "Freight Text Pro", Georgia, "Times New Roman", serif;
      margin: 0;
    }

    .checkout-loading .return-spinner,
    .checkout-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(217, 158, 84, 0.25);
      border-top-color: rgba(217, 158, 84, 1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @media (max-width: 880px) {
      .checkout-grid { grid-template-columns: 1fr; gap: 28px; }
      .checkout-page { padding: 36px 18px 72px; }
    }

    @media (max-width: 768px) {
      .checkout-panel { padding: 24px 20px; }
      .summary-item { grid-template-columns: 56px minmax(0, 1fr) auto; gap: 12px; }
      .summary-item-image { width: 56px; height: 56px; }
    }

    @media (max-width: 480px) {
      :root { --checkout-summary-price-spacing: 4px; }
      .checkout-page { padding: 32px 14px 60px; }
      .checkout-subheading { margin-bottom: 30px; }
      .checkout-panel { padding: 20px 16px; }
      .summary-item { grid-template-columns: 56px minmax(0, 1fr); align-items: flex-start; }
      .summary-item-price { grid-column: 2; justify-self: start; margin-top: var(--checkout-summary-price-spacing); }
      .summary-total-amount { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <header class="site-header banner">
    <div class="container topbar">
      <div class="brand">
        <a class="brand-text" href="index.html"><strong>Keystone Coffee</strong></a>
      </div>
      <div class="nav-wrap">
        <nav id="mainNav" class="nav-menu">
          <a href="index.html#featured-coffee">Shop</a>
          <a href="index.html#table-talk">Table Talk</a>
          <a href="index.html#about-us">About Us</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="checkout-page">
    <div class="checkout-shell">
      <a class="checkout-back" href="index.html">← Continue shopping</a>
      <h1 class="checkout-heading">Checkout</h1>
      <p class="checkout-subheading">Review your order and complete your purchase securely.</p>

      <div class="checkout-grid">
        <section class="checkout-panel" aria-label="Order summary">
          <h2>Order Summary</h2>
          <div id="orderSummary">
            <div class="checkout-loading">
              <div class="checkout-loading-spinner"></div>
            </div>
          </div>
        </section>

        <div class="checkout-right-column">
          <section class="checkout-panel" aria-label="Shipping address">
            <h2>Shipping Address</h2>
            <form id="shippingForm" class="shipping-form">
              <label>Full Name<input id="shippingName" name="name" type="text" autocomplete="name" required /></label>
              <label>Street Address<input id="shippingStreet1" name="street1" type="text" autocomplete="address-line1" required /></label>
              <label>City<input id="shippingCity" name="city" type="text" autocomplete="address-level2" required /></label>
              <label>State<input id="shippingState" name="state" type="text" autocomplete="address-level1" required /></label>
              <label>ZIP Code<input id="shippingZip" name="zip" type="text" autocomplete="postal-code" required /></label>
              <label>Email<input id="shippingEmail" name="email" type="email" autocomplete="email" required /></label>
            </form>
          </section>

          <section class="checkout-panel" aria-label="Payment">
            <h2>Payment</h2>
            <div id="paymentArea">
              <div class="checkout-loading">
                <div class="checkout-loading-spinner"></div>
                <p>Preparing secure payment&hellip;</p>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="checkout.js"></script>
</body>
</html>
