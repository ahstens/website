<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Keystone Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .checkout-page {
      min-height: calc(100vh - 96px);
      background: var(--bg);
      padding: 56px 24px 96px;
      font-size: 18px;
      line-height: 1.7;
    }

    .checkout-shell {
      max-width: 1080px;
      margin: 0 auto;
    }

    .checkout-heading {
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-size: clamp(2.2rem, 4vw, 3rem);
      font-weight: 700;
      margin: 0 0 8px;
    }

    .checkout-subheading {
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1.06rem;
      line-height: 1.7;
      margin: 0 0 40px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.85fr);
      gap: 40px;
      align-items: start;
    }

    .checkout-panel {
      background: rgba(247, 244, 239, 0.06);
      border: 2px solid rgb(217, 158, 84);
      border-radius: 16px;
      padding: 32px 30px;
    }

    .checkout-panel h2 {
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 22px;
    }

    /* Order summary */
    .summary-item {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(217, 158, 84, 0.22);
    }

    .summary-item:first-of-type { padding-top: 0; }

    .summary-item-image {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      background: rgb(247, 244, 239);
      display: block;
    }

    .summary-item-name {
      margin: 0;
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1.04rem;
      font-weight: 700;
    }

    .summary-item-meta {
      margin: 4px 0 0;
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 0.96rem;
      line-height: 1.6;
    }

    .summary-item-price {
      margin: 0;
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-size: 1.04rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .summary-total {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 22px;
      border-top: 2px solid rgb(217, 158, 84);
    }

    .summary-total-label {
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.92rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .summary-total-amount {
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-size: 1.7rem;
      font-weight: 700;
    }

    .summary-empty {
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1.04rem;
      line-height: 1.7;
    }

    .summary-empty a {
      color: rgb(217, 158, 84);
      font-weight: 700;
      text-decoration: underline;
    }

    /* Payment column */
    #payment-element { margin-bottom: 26px; min-height: 60px; }

    .checkout-form-grid {
      margin: 0 0 18px;
      border: 1px solid rgba(217, 158, 84, 0.35);
      border-radius: 10px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .checkout-form-grid legend {
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-weight: 700;
      padding: 0 6px;
    }

    .checkout-form-grid label {
      display: grid;
      gap: 6px;
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1rem;
    }

    .checkout-form-grid input {
      border: 1px solid rgba(217, 158, 84, 0.45);
      border-radius: 8px;
      background: rgba(247, 244, 239, 0.08);
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1rem;
      padding: 10px 12px;
    }

    .checkout-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1rem;
    }

    .pay-btn {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 8px;
      background: rgb(217, 158, 84);
      color: rgb(110, 67, 77);
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .pay-btn:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .pay-btn:disabled { opacity: 0.6; cursor: default; }

    .pay-btn-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: -3px;
      border: 2px solid rgba(110, 67, 77, 0.35);
      border-top-color: rgb(110, 67, 77);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .pay-message {
      margin: 18px 0 0;
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-size: 0.98rem;
      text-align: center;
      min-height: 1.2em;
    }

    .checkout-secure {
      margin: 20px 0 0;
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 0.88rem;
      text-align: center;
    }

    .checkout-back {
      display: inline-block;
      margin-bottom: 28px;
      color: rgb(217, 158, 84);
      font-family: var(--font-serif);
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    .checkout-back:hover { color: rgb(217, 158, 84); text-decoration: underline; }

    .checkout-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 0;
    }

    .checkout-loading p {
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      margin: 0;
    }

    .checkout-loading .return-spinner,
    .checkout-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(217, 158, 84, 0.25);
      border-top-color: rgb(217, 158, 84);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @media (max-width: 880px) {
      .checkout-grid { grid-template-columns: 1fr; gap: 28px; }
      .checkout-page { padding: 36px 18px 72px; }
    }

    @media (max-width: 768px) {
      .checkout-panel { padding: 24px 20px; }
      .summary-item { grid-template-columns: 56px minmax(0, 1fr) auto; gap: 12px; }
      .summary-item-image { width: 56px; height: 56px; }
    }

    @media (max-width: 480px) {
      :root { --checkout-summary-price-spacing: 4px; }
      .checkout-page { padding: 32px 14px 60px; }
      .checkout-subheading { margin-bottom: 30px; }
      .checkout-panel { padding: 20px 16px; }
      .summary-item { grid-template-columns: 56px minmax(0, 1fr); align-items: flex-start; }
      .summary-item-price { grid-column: 2; justify-self: start; margin-top: var(--checkout-summary-price-spacing); }
      .summary-total-amount { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <header class="site-header banner">
    <div class="container topbar">
      <div class="brand">
        <a class="brand-text" href="index.html"><strong>Keystone Coffee</strong></a>
      </div>
      <div class="nav-wrap">
        <nav id="mainNav" class="nav-menu">
          <a href="index.html#featured-coffee">Shop</a>
          <a href="index.html#table-talk">Table Talk</a>
          <a href="index.html#about-us">About Us</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="checkout-page">
    <div class="checkout-shell">
      <a class="checkout-back" href="index.html">← Continue shopping</a>
      <h1 class="checkout-heading">Checkout</h1>
      <p class="checkout-subheading">Review your order and complete your purchase securely.</p>

      <div class="checkout-grid">
        <section class="checkout-panel" aria-label="Order summary">
          <h2>Order Summary</h2>
          <div id="orderSummary">
            <div class="checkout-loading">
              <div class="checkout-loading-spinner"></div>
            </div>
          </div>
        </section>

        <section class="checkout-panel" aria-label="Payment">
          <h2>Payment</h2>
          <div id="paymentArea">
            <div class="checkout-loading">
              <div class="checkout-loading-spinner"></div>
              <p>Preparing secure payment&hellip;</p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
