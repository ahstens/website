<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed | Keystone Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .return-page {
      min-height: calc(100vh - 96px);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    .return-card {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(217, 158, 84, 0.55);
      border-radius: 16px;
      max-width: 640px;
      width: 100%;
      padding: 52px 44px;
      text-align: center;
    }

    .return-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }

    .return-card h1 {
      color: rgba(217, 158, 84, 1);
      font-family: var(--font-serif);
      font-size: 2.2rem;
      margin: 0 0 16px;
    }

    .return-card p {
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0 0 12px;
    }

    .return-email {
      color: rgba(217, 158, 84, 0.9) !important;
      font-weight: 700;
    }

    .return-loading p {
      color: rgba(217, 158, 84, 0.8);
    }

    .return-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(217, 158, 84, 0.25);
      border-top-color: rgba(217, 158, 84, 1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .return-actions {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-primary {
      display: inline-block;
      min-height: 44px;
      padding: 14px 28px;
      background: rgba(217, 158, 84, 1);
      color: rgb(110, 67, 77);
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .return-error h1 { color: rgb(230, 90, 90); }

    .shipping-form {
      text-align: left;
      margin-top: 24px;
      display: grid;
      gap: 14px;
    }

    .shipping-form label {
      display: grid;
      gap: 6px;
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 0.98rem;
    }

    .shipping-form input,
    .shipping-form select {
      border: 1px solid rgba(217, 158, 84, 0.45);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: rgb(247, 244, 239);
      font-family: var(--font-serif);
      font-size: 1rem;
      padding: 12px;
    }

    .shipping-form input::placeholder {
      color: rgba(247, 244, 239, 0.65);
    }

    .shipping-form button {
      border: 0;
      cursor: pointer;
    }

    .return-inline-note {
      color: rgba(217, 158, 84, 0.9) !important;
      font-weight: 700;
      margin-top: 10px;
    }

    .tracking-link {
      color: rgba(217, 158, 84, 1);
      font-weight: 700;
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .return-page { padding: 44px 16px; }
      .return-card { padding: 36px 24px; }
      .return-card h1 { font-size: 1.95rem; }
    }

    @media (max-width: 480px) {
      .return-page { padding: 36px 12px; }
      .return-card { padding: 30px 18px; }
      .return-icon { font-size: 3rem; margin-bottom: 18px; }
      .return-card h1 { font-size: 1.7rem; }
      .return-card p { font-size: 1rem; line-height: 1.6; }
    }
  </style>
</head>
<body>
  <header class="site-header banner">
    <div class="container topbar">
      <div class="brand">
        <a class="brand-text" href="index.html"><strong>Keystone Coffee</strong></a>
      </div>
      <div class="nav-wrap">
        <nav id="mainNav" class="nav-menu">
          <a href="index.html#featured-coffee">Shop</a>
          <a href="table-talk.html">Table Talk</a>
          <a href="about-us.html">About Us</a>
          <a href="tracking.html">Track Order</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="return-page">
    <div class="return-card" id="returnCard">
      <div class="return-loading">
        <div class="return-spinner"></div>
        <p>Confirming your order&hellip;</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    const CART_KEY = 'keystone_cart';
    const SHIPPING_ADDRESS_KEY = 'keystone_shipping_address';
    const TRACKING_NUMBER_KEY = 'keystone_tracking_number';

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function loadCartItems() {
      try {
        const cart = JSON.parse(sessionStorage.getItem(CART_KEY) || '[]');
        if (!Array.isArray(cart)) return [];
        return cart.map((item) => ({
          name: item?.name || 'Item',
          quantity: Math.max(1, Math.floor(Number(item?.quantity) || 1)),
          size: item?.size || '12oz',
        }));
      } catch {
        return [];
      }
    }

    function loadStoredAddress() {
      try {
        const stored = JSON.parse(sessionStorage.getItem(SHIPPING_ADDRESS_KEY) || 'null');
        return stored && typeof stored === 'object' ? stored : null;
      } catch {
        return null;
      }
    }

    function formatExternalUrl(value) {
      try {
        const parsed = new URL(String(value || ''), window.location.origin);
        if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
          return parsed.toString();
        }
      } catch {}
      return '';
    }

    async function checkSession() {
      const params = new URLSearchParams(window.location.search);
      const paymentIntentId = params.get('payment_intent');
      const card = document.getElementById('returnCard');

      if (!paymentIntentId) {
        renderError(card, 'No payment found. If you completed a purchase, check your email for confirmation.');
        return;
      }

      try {
        const res = await fetch(`/.netlify/functions/retrieve-payment-intent?payment_intent=${encodeURIComponent(paymentIntentId)}`);
        const data = await res.json();

        if (!res.ok || data.error) throw new Error(data.error || 'Could not retrieve payment status');

        if (data.status === 'succeeded') {
          await handleSuccessfulPayment(card, data.customerEmail || null);
        } else if (data.status === 'processing') {
          sessionStorage.removeItem(CART_KEY);
          renderProcessing(card);
        } else {
          renderError(card, 'Your payment was not completed. Please return to the store and try again.');
        }
      } catch (err) {
        renderError(card, err.message || 'Could not confirm your order. Please contact support.');
      }
    }

    async function handleSuccessfulPayment(card, email) {
      const items = loadCartItems();
      const storedAddress = loadStoredAddress();

      if (!items.length) {
        sessionStorage.removeItem(CART_KEY);
        renderPaymentOnlySuccess(card, email, 'Your payment is confirmed. We could not find cart item details for automatic label creation.');
        return;
      }

      if (storedAddress) {
        await createLabelAndRender(card, storedAddress, items, email);
        return;
      }

      renderAddressForm(card, email, items);
    }

    function renderAddressForm(card, email, items) {
      card.classList.remove('return-error');
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#10003;</span>
        <h1>Payment Confirmed!</h1>
        <p>Your payment was successful. Please confirm your shipping address so we can create your label.</p>
        ${email ? `<p class="return-email">${escapeHtml(email)}</p>` : ''}
        <form id="shippingForm" class="shipping-form">
          <label>Full Name<input name="name" type="text" autocomplete="name" required /></label>
          <label>Street Address<input name="street1" type="text" autocomplete="address-line1" required /></label>
          <label>City<input name="city" type="text" autocomplete="address-level2" required /></label>
          <label>State<input name="state" type="text" autocomplete="address-level1" required /></label>
          <label>ZIP Code<input name="zip" type="text" autocomplete="postal-code" required /></label>
          <label>Email<input name="email" type="email" autocomplete="email" value="${escapeHtml(email || '')}" required /></label>
          <button type="submit" class="btn-primary">Create Shipping Label</button>
        </form>
      `;

      const form = document.getElementById('shippingForm');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const toAddress = {
          name: String(formData.get('name') || '').trim(),
          street1: String(formData.get('street1') || '').trim(),
          city: String(formData.get('city') || '').trim(),
          state: String(formData.get('state') || '').trim(),
          zip: String(formData.get('zip') || '').trim(),
          country: 'US',
          email: String(formData.get('email') || '').trim(),
        };

        sessionStorage.setItem(SHIPPING_ADDRESS_KEY, JSON.stringify(toAddress));
        await createLabelAndRender(card, toAddress, items, email);
      });
    }

    async function createLabelAndRender(card, toAddress, items, email) {
      card.classList.remove('return-error');
      card.innerHTML = `
        <div class="return-loading">
          <div class="return-spinner"></div>
          <p>Payment confirmed. Creating your shipping label&hellip;</p>
        </div>
      `;

      try {
        const res = await fetch('/.netlify/functions/create-shippo-label', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ toAddress, items }),
        });

        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'Label creation failed');

        if (data.trackingNumber) {
          sessionStorage.setItem(TRACKING_NUMBER_KEY, data.trackingNumber);
        }

        sessionStorage.removeItem(CART_KEY);
        renderSuccess(card, email, data);
      } catch (err) {
        sessionStorage.removeItem(CART_KEY);
        renderPaymentOnlySuccess(
          card,
          email,
          `Your payment went through, but we couldn't create the shipping label automatically: ${err.message || 'Please contact support.'}`
        );
      }
    }

    function renderSuccess(card, email, labelData) {
      card.classList.remove('return-error');
      const safeTrackingUrl = formatExternalUrl(labelData.trackingUrl);
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#10003;</span>
        <h1>Order Confirmed!</h1>
        <p>Your payment was successful and your shipping label has been created.</p>
        ${email ? `<p class="return-email">${escapeHtml(email)}</p>` : ''}
        <p class="return-inline-note">Tracking Number: <strong>${escapeHtml(labelData.trackingNumber || 'Pending')}</strong></p>
        ${safeTrackingUrl ? `<p><a class="tracking-link" href="${safeTrackingUrl}" target="_blank" rel="noopener noreferrer">Track this shipment</a></p>` : ''}
        <p>${labelData.carrier ? `Carrier: ${escapeHtml(labelData.carrier)}` : ''} ${labelData.servicelevel ? `(${escapeHtml(labelData.servicelevel)})` : ''}</p>
        <div class="return-actions">
          <a href="tracking.html" class="btn-primary">Track My Order</a>
          <a href="index.html" class="btn-primary">Continue Shopping</a>
        </div>
      `;
    }

    function renderPaymentOnlySuccess(card, email, message) {
      card.classList.remove('return-error');
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#10003;</span>
        <h1>Payment Confirmed!</h1>
        <p>${escapeHtml(message)}</p>
        ${email ? `<p class="return-email">${escapeHtml(email)}</p>` : ''}
        <p>If needed, our team can provide tracking details by email.</p>
        <div class="return-actions">
          <a href="tracking.html" class="btn-primary">Track Order</a>
          <a href="index.html" class="btn-primary">Continue Shopping</a>
        </div>
      `;
    }

    function renderProcessing(card) {
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#9203;</span>
        <h1>Payment Processing</h1>
        <p>Your payment is being processed. We'll email you once it's confirmed.</p>
        <div class="return-actions">
          <a href="index.html" class="btn-primary">Continue Shopping</a>
        </div>
      `;
    }

    function renderError(card, message) {
      card.classList.add('return-error');
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#33;</span>
        <h1>Something Went Wrong</h1>
        <p>${escapeHtml(message)}</p>
        <div class="return-actions">
          <a href="index.html" class="btn-primary">Return to Shop</a>
        </div>
      `;
    }

    checkSession();
  </script>
</body>
</html>
