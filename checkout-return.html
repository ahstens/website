<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed | Keystone Coffee</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .return-page {
      min-height: calc(100vh - 96px);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    .return-card {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(217, 158, 84, 0.55);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      padding: 52px 44px;
      text-align: center;
    }

    .return-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }

    .return-card h1 {
      color: rgba(217, 158, 84, 1);
      font-family: serif;
      font-size: 2.2rem;
      margin: 0 0 16px;
    }

    .return-card p {
      color: rgb(247, 244, 239);
      font-family: serif;
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0 0 12px;
    }

    .return-email {
      color: rgba(217, 158, 84, 0.9) !important;
      font-weight: 700;
    }

    .return-loading p {
      color: rgba(217, 158, 84, 0.8);
    }

    .return-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(217, 158, 84, 0.25);
      border-top-color: rgba(217, 158, 84, 1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .return-actions {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-primary {
      display: inline-block;
      padding: 14px 28px;
      background: rgba(217, 158, 84, 1);
      color: rgb(110, 67, 77);
      font-family: serif;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .return-error h1 { color: rgb(230, 90, 90); }
  </style>
</head>
<body>
  <header class="site-header banner">
    <div class="container topbar">
      <div class="brand">
        <a class="brand-text" href="index.html"><strong>Keystone Coffee</strong></a>
      </div>
      <div class="nav-wrap">
        <nav id="mainNav" class="nav-menu">
          <a href="index.html#featured-coffee">Shop</a>
          <a href="index.html#table-talk">Table Talk</a>
          <a href="index.html#about-us">About Us</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="return-page">
    <div class="return-card" id="returnCard">
      <div class="return-loading">
        <div class="return-spinner"></div>
        <p>Confirming your order&hellip;</p>
      </div>
    </div>
  </main>

  <script>
    const CART_KEY = 'keystone_cart';

    async function checkSession() {
      const params = new URLSearchParams(window.location.search);
      const paymentIntentId = params.get('payment_intent');
      const card = document.getElementById('returnCard');

      if (!paymentIntentId) {
        renderError(card, 'No payment found. If you completed a purchase, check your email for confirmation.');
        return;
      }

      try {
        const res = await fetch(`/.netlify/functions/retrieve-payment-intent?payment_intent=${encodeURIComponent(paymentIntentId)}`);
        const data = await res.json();

        if (!res.ok || data.error) throw new Error(data.error || 'Could not retrieve payment status');

        if (data.status === 'succeeded') {
          sessionStorage.removeItem(CART_KEY);
          renderSuccess(card, data.customerEmail);
        } else if (data.status === 'processing') {
          sessionStorage.removeItem(CART_KEY);
          renderProcessing(card);
        } else {
          renderError(card, 'Your payment was not completed. Please return to the store and try again.');
        }
      } catch (err) {
        renderError(card, err.message || 'Could not confirm your order. Please contact support.');
      }
    }

    function renderSuccess(card, email) {
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#10003;</span>
        <h1>Order Confirmed!</h1>
        <p>Thank you for your purchase. Your Keystone Coffee is on its way.</p>
        ${email ? `<p class="return-email">${escapeHtml(email)}</p>` : ''}
        <p>A confirmation email will be sent to you shortly.</p>
        <div class="return-actions">
          <a href="index.html" class="btn-primary">Continue Shopping</a>
        </div>
      `;
    }

    function renderProcessing(card) {
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#9203;</span>
        <h1>Payment Processing</h1>
        <p>Your payment is being processed. We'll email you once it's confirmed.</p>
        <div class="return-actions">
          <a href="index.html" class="btn-primary">Continue Shopping</a>
        </div>
      `;
    }

    function renderError(card, message) {
      card.classList.add('return-error');
      card.innerHTML = `
        <span class="return-icon" aria-hidden="true">&#33;</span>
        <h1>Something Went Wrong</h1>
        <p>${escapeHtml(message)}</p>
        <div class="return-actions">
          <a href="index.html" class="btn-primary">Return to Shop</a>
        </div>
      `;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    checkSession();
  </script>
</body>
</html>
