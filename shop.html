<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | Keystone Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header banner">
    <div class="container topbar">
      <div class="brand">
        <a class="brand-text" href="index.html"><strong>Keystone Coffee</strong></a>
      </div>

      <div class="nav-wrap">
        <button class="cart-toggle" id="cartToggle" aria-expanded="false" aria-controls="cartDrawer" aria-label="Open cart">
          <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/Shopping%20Cart.png" alt="" aria-hidden="true" class="cart-icon" />
          <span class="cart-count" id="cartCount" hidden>0</span>
        </button>

        <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="mainNav" aria-label="Open menu">
          <svg class="nav-icon" width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M30 20 L70 20 L62 80 L38 80 Z" fill="white" />
          </svg>
        </button>
        <nav id="mainNav" class="nav-menu">
          <a href="shop.html">Shop</a>
          <a href="table-talk.html">Table Talk</a>
          <a href="about-us.html">About Us</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="cart-overlay" id="cartOverlay" hidden></div>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-drawer-header">
      <div class="cart-drawer-title-wrap">
        <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/Shopping%20Cart.png" alt="" aria-hidden="true" class="cart-drawer-icon" />
        <h2>My Cart</h2>
      </div>
      <button class="cart-close" id="cartClose" aria-label="Close cart">×</button>
    </div>

    <div class="cart-drawer-body" id="cartItems"></div>

    <div class="cart-drawer-footer">
      <div class="cart-subtotal-row">
        <div class="cart-subtotal-label">SUBTOTAL</div>
        <div class="cart-subtotal-amount" id="cartSubtotal">$0.00</div>
      </div>
      <button type="button" class="checkout-btn">Checkout</button>
    </div>
  </aside>

  <main class="shop-page">
    <section class="section" id="shop-products">
      <div class="container">
        <h2>Shop Coffee</h2>
        <div class="shop-controls">
          <input class="shop-search" type="search" placeholder="Search coffee..." aria-label="Search products" />
          <div class="shop-filter-group" role="group" aria-label="Filter by origin">
            <button type="button" class="shop-filter-btn active" data-filter="all">All</button>
            <button type="button" class="shop-filter-btn" data-filter="ethiopia">Ethiopia</button>
            <button type="button" class="shop-filter-btn" data-filter="colombia">Colombia</button>
            <button type="button" class="shop-filter-btn" data-filter="guatemala">Guatemala</button>
            <button type="button" class="shop-filter-btn" data-filter="sumatra">Sumatra</button>
            <button type="button" class="shop-filter-btn" data-filter="costa rica">Costa Rica</button>
            <button type="button" class="shop-filter-btn" data-filter="brazil">Brazil</button>
          </div>
        </div>

        <div class="grid">
          <a class="card" href="product-ethiopian-yirgacheffe.html" data-product-id="prod_UnQQUDh462KuOs" data-origin="Ethiopia" data-name="Ethiopian Yirgacheffe" data-price="9.99" data-size="12 oz" data-image="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png">
            <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png" alt="Ethiopian Yirgacheffe" />
            <div class="card-body">
              <h3>Ethiopian Yirgacheffe</h3>
              <p class="card-price">$9.99</p>
            </div>
          </a>

          <a class="card" href="product-colombia-supremo.html" data-product-id="prod_UnQQUDh462KuOs" data-origin="Colombia" data-name="Colombia Supremo" data-price="9.99" data-size="12 oz" data-image="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png">
            <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png" alt="Colombia Supremo" />
            <div class="card-body">
              <h3>Colombia Supremo</h3>
              <p class="card-price">$9.99</p>
            </div>
          </a>

          <a class="card" href="product-guatemala-antigua.html" data-product-id="prod_UnQQUDh462KuOs" data-origin="Guatemala" data-name="Guatemala Antigua" data-price="9.99" data-size="12 oz" data-image="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png">
            <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png" alt="Guatemala Antigua" />
            <div class="card-body">
              <h3>Guatemala Antigua</h3>
              <p class="card-price">$9.99</p>
            </div>
          </a>

          <a class="card" href="product-sumatra-mandheling.html" data-product-id="prod_UnQQUDh462KuOs" data-origin="Sumatra" data-name="Sumatra Mandheling" data-price="9.99" data-size="12 oz" data-image="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png">
            <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png" alt="Sumatra Mandheling" />
            <div class="card-body">
              <h3>Sumatra Mandheling</h3>
              <p class="card-price">$9.99</p>
            </div>
          </a>

          <a class="card" href="product-costa-rica-tarrazu.html" data-product-id="prod_UnQQUDh462KuOs" data-origin="Costa Rica" data-name="Costa Rica Tarrazú" data-price="9.99" data-size="12 oz" data-image="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png">
            <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png" alt="Costa Rica Tarrazú" />
            <div class="card-body">
              <h3>Costa Rica Tarrazú</h3>
              <p class="card-price">$9.99</p>
            </div>
          </a>

          <a class="card" href="product-brazil-santos.html" data-product-id="prod_UnQQUDh462KuOs" data-origin="Brazil" data-name="Brazil Santos" data-price="9.99" data-size="12 oz" data-image="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png">
            <img src="https://uploads.onecompiler.io/44s4v5rmy/44s4vrcn2/6-2-3130457824-removebg-preview.png" alt="Brazil Santos" />
            <div class="card-body">
              <h3>Brazil Santos</h3>
              <p class="card-price">$9.99</p>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
